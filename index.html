<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All In One Accessories</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url("assets/images/carl-raw-m3hn2Kn5Bns-unsplash.jpg")
  no-repeat center/cover;
}

/* NAVBAR */
.navbar {
  margin: 15px;
  padding: 15px 20px;
  border-radius: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
}

.navbar ul {
  display: flex;
  list-style: none;
  gap: 15px;
  flex-wrap: wrap;
}

.navbar a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* SEARCH */
.search-box {
  text-align: center;
  margin: 15px;
}

.input {
  padding: 10px;
  width: 280px;
  border-radius: 15px;
  border: none;
}

/* HERO */
.hero {
  margin: 20px;
  padding: 30px;
  text-align: center;
  border-radius: 20px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
}

/* PRODUK */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  padding: 15px;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 600px) {
  .input {
    width: 90%;
  }

  .navbar {
    flex-direction: column;
    gap: 10px;
  }

  .hero h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <h2>🎮 All In One</h2>

  <ul id="nav-menu">
    <!-- diisi JS -->
  </ul>
</nav>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari produk..." class="input">
</div>

<section class="hero">
  <h2>Upgrade Setup Gaming Lo 🔥</h2>
</section>

<section class="products" id="product-list"></section>

<script>
// ================= LOGIN STATE =================
const isLogin = localStorage.getItem("isLogin");

// NAVBAR DINAMIS
const nav = document.getElementById("nav-menu");

if (isLogin) {
  nav.innerHTML = `
    <li><a href="#">Home</a></li>
    <li><a href="cart.html">Cart 🛒 (<span id="cart-count">0</span>)</a></li>
    <li><a href="#" onclick="logout()">Logout</a></li>
  `;
} else {
  nav.innerHTML = `
    <li><a href="#">Home</a></li>
    <li><a href="login.html">Login</a></li>
    <li><a href="register.html">Register</a></li>
  `;
}

// ================= DATA =================
let products = [
  { nama: "Mouse Gaming RGB", harga: 150000, gambar: "assets/images/h525.png" },
  { nama: "Keyboard Mechanical", harga: 350000, gambar: "assets/images/mechanical-rgb-keyboard-with-illuminated-keys-perfect-for-gaming-and-professional-use-features-customizable-lighting-and-durable-design-png.webp" },
  { nama: "Headset Gaming", harga: 250000, gambar: "assets/images/Gaming-Headset-PNG-Photo.png" }
];

// ================= TAMPIL =================
const container = document.getElementById("product-list");
const search = document.getElementById("search");

function tampilProduk(data) {
  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.gambar}">
        <h3>${p.nama}</h3>
        <p>Rp ${p.harga}</p>

        <button onclick='addToCart("${p.nama}", ${p.harga}, "${p.gambar}")'>
          Tambah
        </button>
      </div>
    `;
  });
}

// ================= SEARCH =================
search.addEventListener("input", () => {
  const keyword = search.value.toLowerCase();

  const hasil = products.filter(p =>
    p.nama.toLowerCase().includes(keyword)
  );

  tampilProduk(hasil);
});

// ================= CART =================
function addToCart(nama, harga, gambar) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({ nama, harga, gambar });

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  alert(nama + " ditambahkan!");
}

// ================= CART COUNT =================
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const el = document.getElementById("cart-count");

  if (el) {
    el.innerText = cart.length;
  }
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("isLogin");
  alert("Logout berhasil!");
  location.reload();
}

// ================= INIT =================
tampilProduk(products);
updateCartCount();
</script>

</body>
</html>
