<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
  /* ================= GLOBAL ================= */
  body {
    margin: 0;
    font-family: Arial;
    color: white;

    background: url("https://images.unsplash.com/photo-1511512578047-dfb367046420")
    no-repeat center/cover;
  }

  /* ================= NAVBAR ================= */
  .navbar {
    margin: 20px;
    padding: 15px 30px;
    border-radius: 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
  }

  /* ================= CONTAINER ================= */
  .container {
    margin: 30px;
    padding: 30px;
    border-radius: 25px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
  }

  h2 {
    margin-top: 20px;
  }

  /* ================= INPUT ================= */
  .input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 10px;
    border: none;

    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* ================= BUTTON ================= */
  .btn {
    padding: 10px 15px;
    margin-top: 10px;

    border: none;
    border-radius: 10px;

    background: #00ffcc;
    cursor: pointer;
  }

  .btn:hover {
    background: #00ccaa;
  }

  /* ================= PRODUK LIST ================= */
  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 10px;
    margin: 10px 0;

    border-radius: 10px;
    background: rgba(255,255,255,0.05);
  }

  .item img {
    width: 60px;
    border-radius: 8px;
  }

  .actions button {
    margin-left: 5px;
    padding: 5px 10px;
  }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>🛠️ Admin Panel</h2>
    <a href="index.html" style="color:white;">← Kembali</a>
  </nav>

  <!-- CONTENT -->
  <div class="container">

    <h2>Tambah Produk</h2>

    <input type="text" id="nama" placeholder="Nama Produk" class="input">
    <input type="number" id="harga" placeholder="Harga" class="input">
    <input type="text" id="gambar" placeholder="URL Gambar" class="input">

    <button onclick="tambahProduk()" class="btn">Tambah</button>

    <h2>Daftar Produk</h2>
    <div id="list-produk"></div>

  </div>

  <script src="assets/js/admin.js"></script>

  <!-- 🔒 PROTEKSI ADMIN -->
  <script>
    const role = localStorage.getItem("role");

    if (role !== "admin") {
      alert("Akses ditolak! Khusus admin ❌");
      window.location.href = "index.html";
    }
  </script>

  <!-- ✨ ANIMASI -->
  <script>
    document.body.style.opacity = 0;
    setTimeout(() => {
      document.body.style.transition = "0.5s";
      document.body.style.opacity = 1;
    }, 100);
  </script>

</body>
</html>
